    <script>
        // Asynchronous component loader
        async function loadComponents() {
            try {
                // 1. Fetch dynamic chunks securely
                const heroRes = await fetch('components/hero.html');
                const heroHtml = await heroRes.text();
                document.getElementById('app-hero-container').innerHTML = heroHtml;

                const sections = ['about', 'experience', 'projects', 'skills', 'education', 'contact'];
                let containerHtml = '';
                for (const section of sections) {
                    const res = await fetch(`components/${section}.html`);
                    containerHtml += await res.text() + '\n';
                }
                document.getElementById('app-container').innerHTML = containerHtml;

                // 2. Hide preloader overlay now that paint is complete
                const loader = document.querySelector('.loader-overlay');
                if (loader) loader.classList.add('hidden');

                // 3. Inject javascript so event listeners hook onto the new DOM elements securely
                const script = document.createElement('script');
                script.src = 'js/main.js';
                document.body.appendChild(script);

            } catch (err) {
                console.error('Error loading components:', err);
                const loader = document.querySelector('.loader-overlay');
                if (loader) loader.classList.add('hidden');
            }
        }
        
        loadComponents();
    </script>
